<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 220px;
      padding: 16px;
      font-family: sans-serif;
      background: #1e1e1e;
      color: #fff;
      margin: 0;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 14px;
      color: #ccc;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .label {
      font-size: 13px;
    }
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      inset: 0;
      background: #555;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #4caf50; }
    input:checked + .slider::before { transform: translateX(18px); }

    .divider {
      border: none;
      border-top: 1px solid #333;
      margin: 12px 0;
    }

    .format-section label {
      display: block;
      font-size: 11px;
      color: #aaa;
      margin-bottom: 6px;
    }
    .format-section input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      background: #2e2e2e;
      border: 1px solid #444;
      border-radius: 4px;
      color: #fff;
      font-size: 11px;
      padding: 5px 7px;
      outline: none;
    }
    .format-section input[type="text"]:focus {
      border-color: #4caf50;
    }
    .hint {
      font-size: 10px;
      color: #666;
      margin-top: 5px;
      line-height: 1.5;
    }
    .format-btn-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .format-btn-row button {
      flex: 1;
      padding: 5px 0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
    }
    #format-save { background: #4caf50; color: white; }
    #format-reset { background: #555; color: white; }
    #preview {
      font-size: 10px;
      color: #4caf50;
      margin-top: 6px;
      word-break: break-all;
    }

    #confirm-box {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #333;
    }
    #confirm-msg {
      font-size: 12px;
      color: #ccc;
      margin: 0 0 10px 0;
      line-height: 1.4;
    }
    .btn-row {
      display: flex;
      gap: 8px;
    }
    .btn-row button {
      flex: 1;
      padding: 5px 0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
    }
    #confirm-ok { background: #4caf50; color: white; }
    #confirm-cancel { background: #555; color: white; }
  </style>
</head>
<body>
<h3>AI Chat Timestamp</h3>

<div class="toggle-row">
  <span class="label" id="status">OFF</span>
  <label class="switch">
    <input type="checkbox" id="toggle">
    <span class="slider"></span>
  </label>
</div>

<hr class="divider">

<div class="format-section">
  <label>타임스탬프 포맷</label>
  <input type="text" id="format-input" placeholder="[채팅시간:YYYY/MM/DD HH:mm:ss]">
  <div class="hint">
    YYYY 년 · MM 월 · DD 일<br>
    HH 시 · mm 분 · ss 초
  </div>
  <div id="preview"></div>
  <div class="format-btn-row">
    <button id="format-save">저장</button>
    <button id="format-reset">초기화</button>
  </div>
</div>

<div id="confirm-box">
  <p id="confirm-msg"></p>
  <div class="btn-row">
    <button id="confirm-ok">확인</button>
    <button id="confirm-cancel">취소</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
