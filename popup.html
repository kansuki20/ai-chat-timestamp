<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 200px;
      padding: 16px;
      font-family: sans-serif;
      background: #1e1e1e;
      color: #fff;
      margin: 0;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 14px;
      color: #ccc;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .label {
      font-size: 13px;
    }
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      inset: 0;
      background: #555;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #4caf50; }
    input:checked + .slider::before { transform: translateX(18px); }

    #confirm-box {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #333;
    }
    #confirm-msg {
      font-size: 12px;
      color: #ccc;
      margin: 0 0 10px 0;
      line-height: 1.4;
    }
    .btn-row {
      display: flex;
      gap: 8px;
    }
    .btn-row button {
      flex: 1;
      padding: 5px 0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
    }
    #confirm-ok { background: #4caf50; color: white; }
    #confirm-cancel { background: #555; color: white; }
  </style>
</head>
<body>
  <h3>AI Chat Timestamp</h3>
  <div class="toggle-row">
    <span class="label" id="status">OFF</span>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div id="confirm-box">
    <p id="confirm-msg"></p>
    <div class="btn-row">
      <button id="confirm-ok">확인</button>
      <button id="confirm-cancel">취소</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
